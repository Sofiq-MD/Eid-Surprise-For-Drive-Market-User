<!DOCTYPE html><html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drive Market Eid Greeting</title><link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet"><style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Hind Siliguri',sans-serif;}

body{
height:100vh;
background:#000;
color:gold;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

/* Intro */
.intro{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:#000;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
animation:fadeOut 1s ease 3s forwards;
}

.intro-logo{
width:100px;
animation:zoom 2s ease;
filter:drop-shadow(0 0 20px gold);
}

.intro-text{
margin-top:15px;
font-size:24px;
opacity:0;
animation:textFade 2s ease 1s forwards;
}

@keyframes zoom{
0%{transform:scale(0.5);opacity:0;}
100%{transform:scale(1);opacity:1;}
}

@keyframes textFade{
to{opacity:1;}
}

@keyframes fadeOut{
to{opacity:0;visibility:hidden;}
}

/* Particles */
.particle{
position:absolute;
width:2px;height:2px;
background:gold;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh);}
100%{transform:translateY(-10vh);}
}

/* Glass UI */
.container{
width:90%;
max-width:420px;
padding:25px;
border-radius:20px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);
border:1px solid rgba(255,215,0,0.3);
text-align:center;
box-shadow:0 0 30px rgba(255,215,0,0.2);
}

/* Logo */
.logo{
width:90px;
margin-bottom:15px;
filter:drop-shadow(0 0 10px gold);
}

/* Button */
button{
margin-top:12px;
padding:12px;
border:none;
border-radius:10px;
background:linear-gradient(45deg,gold,#ffcc00);
color:black;
font-weight:bold;
cursor:pointer;
}

/* Watermark */
.watermark{
position:absolute;
bottom:15px;
right:15px;
font-size:12px;
opacity:0.6;
color:#fff;
}
</style></head><body><!-- Intro --><div id="intro" class="intro">
<img src="logo.png" class="intro-logo">
<h1 class="intro-text">🌙 Eid Mubarak 🌙</h1>
</div><!-- Particles --><script>
for(let i=0;i<40;i++){
let p=document.createElement("div");
p.className="particle";
p.style.left=Math.random()*100+"%";
p.style.animationDuration=(3+Math.random()*5)+"s";
document.body.appendChild(p);
}
</script><!-- Music --><audio id="music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio><div class="container"><img src="logo.png" class="logo"><h2>🌙 শুভ ঈদ-উল-ফিতর 🌙</h2><p style="margin-top:12px; line-height:1.8;">
Drive Market পরিবারের পক্ষ থেকে<br>
আপনার এবং আপনার পরিবারের জন্য<br>
রইলো আন্তরিক শুভেচ্ছা 💖
</p><p style="margin-top:12px; color:#fff3b0; line-height:1.8;">
🌙 ঈদের চাঁদে জাগুক নতুন আশা<br>
✨ সুখে ভরে উঠুক প্রতিটি ভাষা<br>
💖 ভালোবাসা ছড়িয়ে যাক ঘরে ঘরে<br>
🎉 আনন্দ থাকুক সারাক্ষণ ভরে
</p><button onclick="playMusic()">🎧 শুভেচ্ছা শুনুন</button>

<a href="https://play.google.com/store/apps/details?id=com.dtc24expert.user" target="_blank">
<button>📲 Drive Market App</button>
</a></div><div class="watermark">Drive Market</div><script>
/* Intro + Music */
window.onload=function(){
setTimeout(()=>{
document.getElementById("intro").style.display="none";

let music=document.getElementById("music");
music.volume=0;
music.play().catch(()=>{});

let vol=0;
let fade=setInterval(()=>{
if(vol<0.5){
vol+=0.05;
music.volume=vol;
}else{
clearInterval(fade);
}
},200);

},3000);
}

/* Button play */
function playMusic(){
let m=document.getElementById("music");
m.play();
}
</script></body>
</html>
